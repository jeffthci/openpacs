# nginx.conf
# ─────────────────────────────────────────────────────────────────
# Production reverse proxy for OpenPACS
#
# Layout:
#   /          → React frontend (static files)
#   /api/*     → FastAPI backend
#   /wado/*    → FastAPI DICOMweb
#   /ohif/*    → OHIF Viewer (if running)
#
# TLS:  Place certificates at /etc/nginx/ssl/
#       Use certbot for Let's Encrypt or supply your own.
# ─────────────────────────────────────────────────────────────────

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 2G;          # allow large DICOM uploads via STOW-RS

    # ── Logging ───────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Upstream backends ─────────────────────────────────────────
    upstream fastapi {
        server backend:8000;
        keepalive 32;
    }

    upstream ohif {
        server ohif:80;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name your.pacs.server;             # ← change this

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # ── HSTS ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000" always;

        # ── CORS headers for DICOMweb (OHIF cross-origin) ─────────
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

        # Handle preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── React frontend (static) ────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;   # SPA routing

            # Cache static assets aggressively, but not index.html
            location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── FastAPI REST API ───────────────────────────────────────
        location /api/ {
            proxy_pass         http://fastapi/api/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── DICOMweb (QIDO/WADO/STOW) ─────────────────────────────
        location /wado/ {
            proxy_pass         http://fastapi/wado/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 300s;              # large study retrieval
            proxy_buffering    off;               # stream large responses
            proxy_request_buffering off;          # stream large STOW uploads
        }

        # ── OHIF Viewer (proxy) ────────────────────────────────────
        location /ohif/ {
            proxy_pass         http://ohif/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── OHIF config ────────────────────────────────────────────
        location /ohif-config.js {
            proxy_pass http://fastapi/ohif-config.js;
        }

        # ── Health check ───────────────────────────────────────────
        location /health {
            proxy_pass http://fastapi/health;
            access_log off;
        }
    }
}
